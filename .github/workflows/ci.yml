name: AgroControl CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend - Build and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore backend
        run: dotnet restore backend/ApiAgro/ApiAgro.csproj

      - name: Build backend
        run: dotnet build backend/ApiAgro/ApiAgro.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/ApiAgro.Tests/ApiAgro.Tests.csproj --configuration Release

  frontend:
    name: Frontend - Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/FrontEndAgro

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/FrontEndAgro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build